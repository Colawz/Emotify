<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心生启翔 - 原型展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .phone-frame {
            width: 390px; /* iPhone 15 Pro 宽度 */
            height: 844px; /* iPhone 15 Pro 高度 */
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            overflow: hidden;
            background: #fff;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="container mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">心生启翔 - 原型展示</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center">
            <!-- 工大点评 -->
            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-4">工大点评</h2>
                <div class="phone-frame">
                    <iframe src="pages/canteen-review.html"></iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
